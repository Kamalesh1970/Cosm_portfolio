<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Explorer - Interactive 3D Portfolio</title>
    <meta name="description" content="Interactive 3D solar system exploration portfolio">
    <meta name="author" content="Kamalesh">
    <meta name="theme-color" content="#0d1117">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
        }
        
        #app {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #fff;
            text-align: center;
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #4cc9f0;
            text-shadow: 0 0 10px rgba(76, 201, 240, 0.5);
        }
        
        .progress-container {
            width: 80%;
            max-width: 400px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        
        .progress-bar {
            height: 8px;
            background: linear-gradient(90deg, #4cc9f0, #f72585);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            margin-top: 10px;
            font-size: 1.1rem;
        }
        
        /* HUD and UI elements */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            color: #fff;
        }
        
        .companion {
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }
        
        .direction-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 50%;
            background: #4cc9f0;
            transform: translate(-50%, -50%);
        }
        
        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0.9;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div class="loading-screen" id="loading-screen">
        <div class="logo">Solar System Explorer</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-text" id="progress-text">0%</div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
